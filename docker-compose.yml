services:
  mysql:
    image: mysql:8.4
    container_name: mini_kb_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mini_kb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: mini_kb_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mysql_data:
  qdrant_data:
